<!DOCTYPE html>
<html>
<body>
  <div id="status">Processing...</div>
  <div id="results"></div>
  <script>
    async function processImage(src, filename) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          // Loop through pixels and make "near white" pixels transparent
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            
            // Threshold for white (adjust if needed)
            if (r > 240 && g > 240 && b > 240) {
              data[i+3] = 0; // Set alpha to 0
            }
          }
          
          ctx.putImageData(imageData, 0, 0);
          const dataUrl = canvas.toDataURL('image/png');
          
          const link = document.createElement('a');
          link.href = dataUrl;
          link.download = filename;
          link.textContent = 'Download ' + filename;
          document.getElementById('results').appendChild(link);
          document.getElementById('results').appendChild(document.createElement('br'));
          resolve(dataUrl);
        };
        img.src = src;
      });
    }

    // Since we are running in a browser tool, we can't easily "download" files back to disk 
    // automatically without user intervention, but I can read the dataURL and then save it 
    // using the file system tools.
    window.process = async () => {
      // We will base64 the results so the agent can read them from the DOM
      const hero = await processImage('hero-product.png', 'hero-product.jpg');
      const bestseller = await processImage('bestseller-product.png', 'bestseller-product.jpg');
      
      const res = document.createElement('div');
      res.id = "final-result-hero";
      res.textContent = hero;
      document.body.appendChild(res);
      
      const res2 = document.createElement('div');
      res2.id = "final-result-bestseller";
      res2.textContent = bestseller;
      document.body.appendChild(res2);
      
      document.getElementById('status').textContent = 'Done';
    };
    
    // Wait for the agent to trigger
  </script>
</body>
</html>
